name: Java CI/CD with Maven

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      MAVEN_OPTS: -Dfile.encoding=UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Install headless UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run tests and package
        run: xvfb-run -a mvn -B -ntp -V clean verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: online-auction-jars
          path: |
            online-auction-client/target/*.jar
            online-auction-server/target/*.jar
            online-auction-shared/target/*.jar
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: online-auction-jars
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.jar
          generate_release_notes: true
